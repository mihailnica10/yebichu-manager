x-mt5-common: &mt5-common
  image: mt5-tigervnc:latest
  restart: unless-stopped
  networks:
    - mt5-net
  volumes:
    - mt5-shared:/mt5-shared
  environment:
    - PASSWORD=${PASSWORD:-changeme}
    - ENABLE_FILEBROWSER=false
    - ENABLE_API=false
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  stdin_open: true
  tty: true

services:
  mt5:
    <<: *mt5-common
    container_name: mt5
    environment:
      INSTANCE_NAME: mt5
      ENABLE_FILEBROWSER: true
    volumes:
      - mt5-shared:/mt5-shared
      - mt5-instance-data:/mt5-instance
      - mt5-wine:/config/.wine

  mt5-2:
    <<: *mt5-common
    container_name: mt5-2
    environment:
      INSTANCE_NAME: mt5-2
    volumes:
      - mt5-shared:/mt5-shared
      - mt5-instance2-data:/mt5-instance
      - mt5-instance2-wine:/config/.wine

  minio:
    image: minio/minio:latest
    container_name: mt5-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - mt5-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mt5-net
    restart: unless-stopped

  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/mt5-configs --ignore-existing;
      echo 'Bucket mt5-configs ready';
      exit 0;
      "

volumes:
  mt5-shared:
    driver: local
    driver_opts:
      type: none
      device: /root/mt5/shared
      o: bind
  mt5-instance-data:
    driver: local
    driver_opts:
      type: none
      device: /root/mt5/instances/mt5/data
      o: bind
  mt5-wine:
    driver: local
    driver_opts:
      type: none
      device: /root/mt5/instances/mt5/wine
      o: bind
  mt5-instance2-data:
    driver: local
    driver_opts:
      type: none
      device: /root/mt5/instances/mt5-2/data
      o: bind
  mt5-instance2-wine:
    driver: local
    driver_opts:
      type: none
      device: /root/mt5/instances/mt5-2/wine
      o: bind
  mt5-minio-data:
    driver: local
    driver_opts:
      type: none
      device: /root/mt5/minio
      o: bind

networks:
  mt5-net:
    external: true
