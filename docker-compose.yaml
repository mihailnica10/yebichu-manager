services:
  mt5-manager:
    image: mt5-manager:latest
    container_name: mt5-manager
    restart: unless-stopped
    ports:
      - "3030:3001"
    networks:
      - mt5-net
    environment:
      - INSTANCES_DIR=/home/misu/mt5/instances
      - SHARED_DIR=/home/misu/mt5/shared
      - ENV_FILE=/home/misu/mt5/.env
      - HOST_IP=178.105.53.57
      - HOST=178.105.53.57
      - HOST_PROC=/host/proc
      - PORT=3001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/misu/mt5:/home/misu/mt5
      - /proc:/host/proc:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /home/misu/.docker/cli-plugins:/home/misu/.docker/cli-plugins:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro

networks:
  mt5-net:
    external: true
